spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.address=0.0.0.0
server.port=8080

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# OpenAI
openai.api.key=${OPENAI_API_KEY}
openai.model=${OPENAI_MODEL}

# Firebase Cloud Messaging (push notification)
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Automatic notify schedule
app.schedule-notification.cron=0 00 07 * * *
app.schedule-notification.timezone=Asia/Ho_Chi_Minh
app.schedule-notification.enabled=${SCHEDULE_NOTIFICATION_ENABLED:true}
